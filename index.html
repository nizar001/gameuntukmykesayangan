<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Bucin 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow-x: hidden;
}

/* efek love background */
body::before {
    content: "❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤";
    position: fixed;
    font-size: 40px;
    color: rgba(255,255,255,0.2);
    animation: loveMove 10s linear infinite;
}

@keyframes loveMove {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-100vh); }
}

h1 {
    text-align: center;
    color: white;
    margin-top: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* kartu game */
.card {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    cursor: pointer;
}

/* animasi hover */
.card:hover {
    transform: scale(1.07);
}

/* animasi klik */
.card:active {
    transform: scale(0.95);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card h3 {
    color: white;
    margin: 10px 0;
}

</style>
</head>

<body>

<h1>💖 Menu Game Firda 💖</h1>

<div class="container">

    <div class="card" onclick="go('tebak.html')">
        <img src="images/tebak.jpg">
        <h3>Tebak Kata</h3>
    </div>

    <div class="card" onclick="go('puzzle.html')">
        <img src="images/puzzle.jpg">
        <h3>Puzzle</h3>
    </div>

    <div class="card" onclick="go('mancing.html')">
        <img src="images/mancing.jpg">
        <h3>Mancing</h3>
    </div>

    <div class="card" onclick="go('bus.html')">
        <img src="images/bus.jpg">
        <h3>Bus Simulator</h3>
    </div>

    <div class="card" onclick="go('war.html')">
        <img src="images/war.jpg">
        <h3>War</h3>
    </div>

    <div class="card" onclick="go('masak.html')">
        <img src="images/masak.jpg">
        <h3>Memasak</h3>
    </div>

    <div class="card" onclick="go('mario.html')">
        <img src="images/mario.jpg">
        <h3>Mario Bros</h3>
    </div>

</div>

<script>
function go(link){
    document.body.style.opacity = "0.5";
    setTimeout(()=>{
        window.location.href = link;
    }, 200);
}
</script>

</body>
</html>
